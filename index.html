<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzmoni - Music Player</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background">
        <div class="animated-gradient"></div>
        <div class="blur-blob blob-1"></div>
        <div class="blur-blob blob-2"></div>
        <div class="blur-blob blob-3"></div>
        <div class="particles-container" id="particlesContainer"></div>
    </div>

    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13M9 9l12-2"></path>
                    </svg>
                    <span> Hanz Library</span>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>Playlists</h3>
                    <ul>
                        <li><a  class="nav-item active">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
                            <span>All Songs</span>
                        </a></li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search Box (Outside player section) -->
            <div class="search-container">
                <div class="search-box" id="searchBox">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search songs...">
                    <button class="search-clear-btn" id="searchClearBtn" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
                <!-- Search Results Dropdown -->
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Top Player Section -->
            <section class="player-section">
                <!-- Album Cover -->
                <div class="album-cover-wrapper">
                    <div class="album-cover" id="albumCover">
                        <img src="assets/default-cover.jpg" alt="" id="coverImage">
                        <!-- Equalizer Animation -->
                        <div class="equalizer" id="equalizer">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                </div>

                <!-- Song Info -->
                <div class="song-info">
                    <div class="now-playing-label">Now Playing</div>
                    <h1 class="song-title" id="songTitle">Select a song</h1>
                    <p class="song-artist" id="songArtist">Unknown Artist</p>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="time" id="currentTime">0:00</div>
                    <div class="progress-bar-wrapper">
                        <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time" id="duration">0:00</div>
                </div>

                <!-- Playback Controls -->
                <div class="controls">
                    <button class="control-btn loop-btn" id="loopBtn" title="Loop">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                    </button>

                    <button class="control-btn prev-btn" id="prevBtn" title="Previous">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>

                    <button class="control-btn play-btn" id="playBtn" title="Play/Pause">
                        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </button>

                    <button class="control-btn next-btn" id="nextBtn" title="Next">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>

                    <button class="control-btn shuffle-btn" id="shuffleBtn" title="Shuffle">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.38L6.5 5.5 5 7l5.59 5.39 4.5-4.5 1.5 1.5-4.5 4.5 4.5 4.5-1.5 1.5-4.5-4.5-5.59 5.39L5 17l4.59-4.62 4.5 4.5 1.5-1.5-4.5-4.5"/></svg>
                    </button>
                </div>

                <!-- Secondary Controls -->
                <div class="secondary-controls">
                    <div class="volume-control">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.3-2.5-4.04v8.08c1.48-.74 2.5-2.27 2.5-4.04zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                        <span class="volume-value" id="volumeValue">100%</span>
                    </div>

                    <div class="speed-control">
                        <label for="speedSelect">Speed:</label>
                        <select id="speedSelect">
                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Playlist Section -->
            <section class="playlist-section">
                <h2>Queue</h2>
                <div class="playlist-list" id="playlistList">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 12l4 4 4-4"></path>
                        </svg>
                        <p>No songs loaded</p>
                        <small>Add MP4 files to 'vid offline' folder</small>
                    </div>
                    <!-- Pagination Controls (Inside scrollable area) -->
                    <div class="pagination-controls" id="paginationControls" style="display: none;">
                        <button class="pagination-btn" id="prevPageBtn" disabled>
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                            </svg>
                            Previous
                        </button>
                        <span class="pagination-info" id="paginationInfo">Page 1 of 1</span>
                        <button class="pagination-btn" id="nextPageBtn" disabled>
                            Next
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audioPlayer"></audio>

    <!-- Scripts -->
    <script src="js/script.js"></script>
</body>
</html>
