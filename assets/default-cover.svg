<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad1)"/>
  
  <!-- Music note symbols -->
  <g opacity="0.3" fill="#ffffff">
    <!-- First note -->
    <circle cx="60" cy="80" r="8"/>
    <rect x="65" y="30" width="4" height="50" rx="2"/>
    
    <!-- Second note -->
    <circle cx="130" cy="120" r="10"/>
    <rect x="137" y="60" width="5" height="60" rx="2"/>
    
    <!-- Connecting beam -->
    <path d="M 69 30 L 142 60 L 142 65 L 69 35 Z" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
</svg>
